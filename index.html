<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elun - Assistente Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Elun</h2>
            <p>Seu facilitador inteligente de conhecimento</p>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                Olá! Sou o Elun. Como posso ajudar você hoje com as políticas e documentos do Sesc?
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Digite sua pergunta..." autocomplete="off">
            <button id="sendButton">Enviar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
